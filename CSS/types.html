<!DOCTYPE html>
<html lang="en">
<head>
    <title>Types in which we write CSS</title>
    <!-- Internal CSS -->
    <style>
        div {
            background-color: cadetblue;
        }
    </style>

    <!-- External CSS -->
     <link rel="stylesheet" href="style.css">
     
</head>
<body>
    <!-- Inline CSS -->
    <h1 style="color: blue; background-color: yellow;">Three ways to add CSS to HTML</h1>
    <div>
        <ol>
            <li>Inline CSS.</li>
            <li>Internal CSS</li>
            <li>External CSS</li>
        </ol>
    </div>
    <p>just learn and have fun!!!...</p>
</body>
</html>
