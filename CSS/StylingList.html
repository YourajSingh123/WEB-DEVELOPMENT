<!DOCTYPE html>
<html lang="en">
<head>
    <title>Styling Lists</title>
    <style>
        nav ul li {
            /* list-style: none; */
            list-style: devanagari;
            /* list-style-type: 🐱; */
            background-color: aqua;
            list-style-position: inside;
            border: 3px solid rebeccapurple;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>Home</li>
            <li>History</li>
            <li>Contact</li>
        </ul>
    </nav>
</body>
</html>
