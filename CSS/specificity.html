<!DOCTYPE html>
<html lang="en">
<head>
    <title>Specificity</title>
    <style>
        /* The Specificity of this selector is 1 */
        h1 {
            color: aqua;
        }

        /* The Specificity of this selector is 1+10 = 11 */
        h1.yellow {
            color: yellow;
        }

        /* The Specificity of this selector is 10 */
        .red {
            /* color: red !important; */
            color: red;
        }

        /* The Specificity of this selector is 10 */
        .pink {
            color: pink;
        }
    </style>
</head>
<body>
    <h1 class="yellow red pink">About Specificity</h1>
</body>
</html>
