<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows & Outlines</title>
    <style>
        .box1 {
            color: aqua;
            background-color: blueviolet;
            border: 3px solid blue;
            margin: 40px;
            padding: 30px;
            box-shadow: 5px 15px 10px 5px green;
        }
        
        .box2 {
            border: 3px solid blue;
            margin: 40px;
            padding: 30px;
            text-shadow: 2px 3px 4px red;
            outline: 3px solid green;
            outline-offset: 10px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="box box1">
        Shadow is used to create depth and visual effects by adding shadows to text and HTML elements.
    </div>

    <div class="box box2">
        <ol>
            Types:
            <li>Box-Shadow</li>
            <li>Text-Shadow</li>
        </ol>
    </div>
</body>
</html>
