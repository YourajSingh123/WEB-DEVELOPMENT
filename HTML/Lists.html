<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lists</title>
</head>
<body>
    <h1>UNORDERED LIST</h1>
    <ul type="square">
        <li>Cricket</li>
        <li>Volleyball</li>
        <li>Badminton</li>
    </ul>

    <h2>ORDERED LIST</h2>
    <ol type="a">
        <li>Cricket</li>
        <li>Volleyball</li>
        <li>Badminton</li>
    </ol>
    
    <h3>DEFINITION/DESCRIPTION LIST</h3>
    <dl>
        <dt>HTML</dt>
        <dd>HyperText Markup Language</dd>

        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>

        <dt>JavaScript</dt>
        <dd>A programming language used for web development.</dd>
    </dl>

</body>
</html>
