<!DOCTYPE html>
<html lang="en">
<head>
    <title>Form</title>
</head>
<body>
    <h1>Form to apply for summer internship</h1>
    <form action="post">

    <div>    
        <label for="username">Enter Name: </label>
        <input type="text" id="username" name="username" placeholder="enter your name">
    </div>
    
    <div>
        <label for="gender">Select Gender: </label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="male">Female</label>
    </div>

    <div>
        <input type="checkbox" id="subscibe" name="subscribe" value="yes">
        <label for="subscribe">Subscribe for stay tuned</label>
    </div>

    <div>
        <label for="comment">Any Comment..</label>
        <textarea name="comment" id="comment" rows="6" cols="40">Any Suggestion...</textarea>
    </div>

    <div>
        <label for="Sports">Select Sports: </label>
        <select name="Sports">
            <option value="Cricket">Cricket</option>
            <option value="Football">Football</option>
            <option value="Hockey">Hockey</option>
        </select>
    </div>

    </form>
</body>
</html>
