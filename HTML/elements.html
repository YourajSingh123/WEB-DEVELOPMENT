<!DOCTYPE html>
<html lang="en">
<head>
    <title>Inline and Block Elements</title>
</head>
<body>
    <!-- Block element-->

    <h2>Welcome</h2>
    <p>This is paragraph one.</p>
    <p>This is paragraph two.</p>
    
    <div>
        This is a div container.
    </div>

    <!-- Inline element-->
    <p>
        This is <b>bold</b>,
        <i>italic</i>,
        <u>underlined</u>,
        and <span style="color:red;">red</span> text.
    </p>
    
</body>
</html>
